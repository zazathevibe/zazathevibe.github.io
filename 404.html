<body>

    <div class="page-container">
      <div class="content-card ztv-prose">
        <h1>404 — Page not found</h1>

  <footer class="site-footer">
    <p>© 2026 ZaZa The Vibe · <a href="/privacy/">Privacy</a> · <a href="/terms/">Terms</a></p>
  </footer>
  <script>
    (function () {
      var p = (location.pathname || "/").toLowerCase();
      function isTermsAlias(path) {
        return path.indexOf("/terms.html") === 0 && path !== "/terms.html";
      }
      if (isTermsAlias(p)) {
        location.replace("/terms/");
        return;
      }
      if (p.indexOf("/privacy/ztv-privacy.html") === 0 && p !== "/privacy/ztv-privacy.html") {
        location.replace("/privacy/ztv-privacy.html");
        return;
      }
      document.getElementById("fallback").setAttribute("href", "/");
    })();
  </script>
  <script src="/_shared_nav.js" defer></script>
